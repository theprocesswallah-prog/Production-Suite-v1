name: Build and Deploy to gh-pages

on:
  push:
    branches:
      - main

permissions:
  contents: write # gh-pages branch create aur write karne ke liye permission zaroori hai

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite output folder
          branch: gh-pages # Nayi branch jisme compiled files jayengi
